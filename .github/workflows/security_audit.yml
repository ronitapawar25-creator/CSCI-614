name: Security Audit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  security-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets (mandatory)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Lambda dependencies
        run: npm --prefix lambda install

      - name: Dependency vulnerability audit (second mandatory check)
        run: npm --prefix lambda audit --audit-level=high

      - name: Block unsafe dynamic code execution
        run: |
          if grep -R --line-number --exclude-dir=node_modules -E "eval\\(|new Function\\(" .; then
            echo "Unsafe dynamic code execution found."
            exit 1
          fi
